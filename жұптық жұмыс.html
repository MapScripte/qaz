<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жұптық жұмыс: Үстеулер әлемі</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Futuristic Background Elements */
        .library-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            perspective: 1000px;
        }

        .bookshelf {
            position: absolute;
            width: 300px;
            height: 400px;
            border-left: 2px solid rgba(0, 243, 255, 0.2);
            box-shadow: -10px 0 20px rgba(0, 243, 255, 0.05);
            animation: float 8s infinite ease-in-out;
        }

        .book-glow {
            height: 2px;
            background: var(--neon-cyan);
            margin: 20px 0;
            box-shadow: 0 0 10px var(--neon-cyan);
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-text-cyan { text-shadow: 0 0 10px var(--neon-cyan); color: var(--neon-cyan); }
        .neon-border-pink:focus { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); outline: none; }
        
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
            pointer-events: none;
            animation: rise 15s infinite linear;
        }

        @keyframes rise {
            from { transform: translateY(100vh); opacity: 0.2; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        [x-cloak] { display: none !important; }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #6014ec; color: rgb(240, 239, 239);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
        .back-bt {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #6014ec;
            color: rgb(240, 239, 239);
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 150;
        }

    </style>
</head>
<body x-data="libraryApp()">
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>
    <a href="index.html" class="back-bt">
    Сергіту сәті
</a>


    <div class="library-bg">
        <div class="bookshelf top-10 left-10"><div class="book-glow"></div><div class="book-glow" style="width: 80%"></div></div>
        <div class="bookshelf bottom-10 right-10"><div class="book-glow" style="background: var(--neon-pink)"></div></div>
        <template x-for="n in 20">
            <div class="particle" :style="`left: ${Math.random()*100}%; width: ${Math.random()*4}px; height: ${Math.random()*4}px; animation-delay: ${Math.random()*10}s`"></div>
        </template>
    </div>

    <div class="container mx-auto px-4 py-12 relative z-10">
        
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-4 neon-text-cyan tracking-tighter italic">
                ЖҰПТЫҚ ЖҰМЫС
            </h1>
            <p class="text-xl text-purple-300 font-light tracking-widest uppercase">
                Үстеу және синонимдер: Цифрлық кітапхана
            </p>
        </header>

        <div class="flex justify-center gap-4 mb-12">
            <template x-for="p in [1, 2, 3]">
                <button 
                    @click="currentPair = p"
                    :class="currentPair === p ? 'bg-cyan-500 shadow-[0_0_20px_#00f3ff] text-black' : 'bg-transparent border border-cyan-500 text-cyan-500'"
                    class="px-8 py-3 rounded-full font-bold transition-all duration-300 hover:scale-105"
                    x-text="'Жұп ' + p">
                </button>
            </template>
        </div>

        <main class="max-w-4xl mx-auto">
            <div class="glass-card p-8 md:p-12 transition-all duration-500" x-show="!isExchanged" x-transition:enter="opacity-0 scale-95">
                
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold text-pink-500">📖 Тапсырма картасы</h2>
                    <div class="w-48 bg-gray-800 h-2 rounded-full overflow-hidden">
                        <div class="bg-cyan-400 h-full transition-all duration-500" :style="`width: ${progress}%`"></div>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-8">
                    <template x-for="(word, index) in assignments[currentPair]">
                        <div class="space-y-4">
                            <label class="block">
                                <span class="text-gray-400 text-sm uppercase tracking-widest">Үстеу</span>
                                <div class="text-3xl font-bold text-white mb-2" x-text="word"></div>
                            </label>

                            <input type="text" 
                                x-model="answers[currentPair][index].synonym"
                                placeholder="Синоним..." 
                                class="w-full bg-black/40 border border-gray-700 rounded-lg p-3 text-white neon-border-pink transition-all">

                            <textarea 
                                x-model="answers[currentPair][index].sentence"
                                placeholder="Кітапхана туралы сөйлем құра..." 
                                class="w-full bg-black/40 border border-gray-700 rounded-lg p-3 text-white h-32 neon-border-pink transition-all"></textarea>
                        </div>
                    </template>
                </div>

                <div class="mt-12 flex flex-col md:flex-row gap-4 justify-center">
                    <button @click="saveAndNotify()" class="bg-gradient-to-r from-purple-600 to-blue-600 px-10 py-4 rounded-xl font-bold hover:shadow-[0_0_30px_rgba(147,51,234,0.5)] transition-all">
                        💾 Сақтау
                    </button>
                    <button @click="exchange()" class="bg-cyan-500 text-black px-10 py-4 rounded-xl font-bold hover:bg-cyan-400 transition-all">
                        🔄 Алмасу (Exchange)
                    </button>
                </div>

            </div>

            <div class="glass-card p-8 md:p-12 border-pink-500/50" x-show="isExchanged" x-transition:enter="opacity-0 rotate-y-180">
                <h2 class="text-3xl font-bold text-cyan-400 mb-6 text-center">🧐 Өзара тексеру</h2>
                <p class="text-center text-gray-400 mb-8">Басқа жұптың жауаптарын бағалаңыз:</p>

                <div class="space-y-8">
                    <template x-for="(ans, i) in answers[currentPair === 3 ? 1 : currentPair + 1]">
                        <div class="bg-white/5 p-6 rounded-xl border border-white/10">
                            <p class="text-pink-400 font-bold mb-2" x-text="'Сөз: ' + assignments[currentPair === 3 ? 1 : currentPair + 1][i]"></p>
                            <p class="mb-2"><span class="text-gray-500 italic">Синоним:</span> <span x-text="ans.synonym" class="text-white"></span></p>
                            <p class="mb-4"><span class="text-gray-500 italic">Сөйлем:</span> <span x-text="ans.sentence" class="text-white"></span></p>
                            
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" class="accent-cyan-500 w-5 h-5"> <span class="text-xs text-gray-400">Синоним дұрыс</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" class="accent-pink-500 w-5 h-5"> <span class="text-xs text-gray-400">Тақырыпқа сай</span>
                                </label>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-10 flex justify-center">
                    <button @click="finishTask()" class="bg-green-500 text-black px-12 py-4 rounded-full font-black tracking-tighter hover:scale-110 transition-transform">
                        ТАПСЫРМАНЫ АЯҚТАУ ✅
                    </button>
                </div>
            </div>
        </main>

    </div>

    <script>
        function libraryApp() {
            return {
                currentPair: 1,
                isExchanged: false,
                assignments: {
                    1: ['Жылдам', 'Ақырын'],
                    2: ['Әрқашан', 'Мұқият'],
                    3: ['Биыл', 'Көп']
                },
                answers: JSON.parse(localStorage.getItem('lib_answers')) || {
                    1: [{synonym: '', sentence: ''}, {synonym: '', sentence: ''}],
                    2: [{synonym: '', sentence: ''}, {synonym: '', sentence: ''}],
                    3: [{synonym: '', sentence: ''}, {synonym: '', sentence: ''}]
                },
                get progress() {
                    let filled = 0;
                    this.answers[this.currentPair].forEach(a => {
                        if(a.synonym) filled += 25;
                        if(a.sentence) filled += 25;
                    });
                    return filled;
                },
                saveAndNotify() {
                    localStorage.setItem('lib_answers', JSON.stringify(this.answers));
                    // Simple sound effect
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play().catch(e => {});
                    alert("Жауаптар сақталды!");
                },
                exchange() {
                    if (this.progress < 100) {
                        alert("Алмасу үшін алдымен барлық өрісті толтырыңыз!");
                        return;
                    }
                    this.isExchanged = true;
                },
                finishTask() {
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#00f3ff', '#ff00ff', '#bc13fe']
                    });
                    setTimeout(() => {
                        alert("Керемет! Сіз цифрлық кітапхана квестін аяқтадыңыз.");
                        this.isExchanged = false;
                    }, 500);
                }
            }
        }
    </script>
</body>
</html>
