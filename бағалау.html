<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Library Assessment</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --neon-blue: #00d2ff;
            --neon-pink: #ff00c1;
            --neon-green: #39ff14;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--neon-blue);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 15px var(--neon-blue);
            max-width: 900px;
        }

        h1 { margin: 0; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .quote { font-style: italic; margin-top: 10px; color: var(--neon-pink); }

        /* 5-тен орналасатын тор (Grid) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1250px;
        }

        .student-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        .student-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .student-no {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 0.7em;
            color: #555;
        }

        input[type="text"] {
            width: 90%;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.85em;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--neon-pink); }

        /* Кітаптар стилі */
        .books-container {
            display: flex;
            justify-content: space-between;
            gap: 2px;
        }

        .book {
            cursor: pointer;
            font-size: 1.1em;
            filter: grayscale(100%);
            transition: 0.2s;
            user-select: none;
        }

        .book.active {
            filter: grayscale(0%);
            text-shadow: 0 0 8px var(--neon-green);
        }

        .motivation-text {
            font-size: 0.75em;
            height: 15px;
            color: var(--neon-green);
            text-align: center;
            font-weight: bold;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            transition: 0.3s;
        }

        .btn-clear { background: #333; color: white; border: 1px solid #555; }
        .btn-clear:hover { background: #e74c3c; box-shadow: 0 0 15px #e74c3c; }

        .btn-download { background: var(--neon-blue); color: black; }
        .btn-download:hover { box-shadow: 0 0 20px var(--neon-blue); }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #00d2ff; color: rgb(15, 15, 15);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }

    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

<div class="header">
    <h1>БАҒАЛАУ ПАРАҒЫ</h1>
    <p class="quote">«Еңбек пен кітапхана – білімнің негізі, ал бағалау – оның өлшемі»</p>
</div>

<div class="grid-container" id="grid">
    </div>

<div class="controls">
    <button class="btn-clear" onclick="clearAll()">Тазалау</button>
    <button class="btn-download" onclick="exportToExcel()">Excel-ге жүктеу</button>
</div>

<script>
    const grid = document.getElementById('grid');
    const totalStudents = 30;
    const motivationList = {
        1: "Талпын!", 2: "Ізден", 3: "Назар аудар", 4: "Орташа", 
        5: "Жақсы", 6: "Жарайсың", 7: "Өте жақсы", 8: "Керемет", 
        9: "Үздік", 10: "Кемеңгер!"
    };

    // Карталарды құру
    for (let i = 1; i <= totalStudents; i++) {
        const card = document.createElement('div');
        card.className = 'student-card';
        card.innerHTML = `
            <span class="student-no">#${i}</span>
            <input type="text" id="name-${i}" placeholder="Аты-жөні" oninput="save(${i})">
            <div class="books-container" id="books-${i}">
                ${Array.from({length: 10}, (_, index) => 
                    `<span class="book" onclick="setScore(${i}, ${index + 1})">📖</span>`
                ).join('')}
            </div>
            <div class="motivation-text" id="moti-${i}">-</div>
        `;
        grid.appendChild(card);
    }

    // Баға қою функциясы
    function setScore(studentId, score) {
        const container = document.getElementById(`books-${studentId}`);
        const books = container.getElementsByClassName('book');
        
        // Кітаптарды жағу/өшіру
        for (let j = 0; j < 10; j++) {
            if (j < score) {
                books[j].classList.add('active');
            } else {
                books[j].classList.remove('active');
            }
        }

        // Мотивация жазу
        document.getElementById(`moti-${studentId}`).innerText = motivationList[score] || "";
        
        save(studentId, score);
    }

    // Сақтау (localStorage)
    function save(id, score) {
        const name = document.getElementById(`name-${id}`).value;
        const currentScore = score || getActiveScore(id);
        const data = { name: name, score: currentScore };
        localStorage.setItem(`neon_student_${id}`, JSON.stringify(data));
    }

    function getActiveScore(id) {
        return document.getElementById(`books-${id}`).querySelectorAll('.book.active').length;
    }

    // Жүктеу (бастапқыда)
    function load() {
        for (let i = 1; i <= totalStudents; i++) {
            const saved = localStorage.getItem(`neon_student_${i}`);
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById(`name-${i}`).value = data.name || "";
                if (data.score > 0) setScore(i, data.score);
            }
        }
    }

    function clearAll() {
        if(confirm("Барлығын өшіру?")) {
            localStorage.clear();
            location.reload();
        }
    }

    // Excel-ге жүктеу (CSV)
    function exportToExcel() {
        let csv = "\uFEFF№,Оқушының аты-жөні,Баға (Кітап саны),Мотивация\n";
        for (let i = 1; i <= totalStudents; i++) {
            const name = document.getElementById(`name-${i}`).value;
            const score = getActiveScore(i);
            const moti = document.getElementById(`moti-${i}`).innerText;
            csv += `${i},${name},${score},${moti}\n`;
        }
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Baga_Paragy_Neon.csv";
        link.click();
    }

    load();
</script>

</body>
</html>
