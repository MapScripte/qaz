<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Үстеулер: Синонимдік Квест</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background: #020205; 
            color: #fff; 
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(circle at top right, #1a0b2e, #020205);
        }
        .neon-glow { box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); border: 1px solid rgba(0, 243, 255, 0.4); }
        .glass-morphism { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-text { background: linear-gradient(90deg, #00f3ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #00d2ff; color: rgb(15, 15, 15);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body x-data="adverbQuest()">
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>


    <div class="container mx-auto px-4 py-8 relative">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black mb-4 accent-text italic uppercase">Синонимдер Квесті</h1>
            <p class="text-cyan-400 tracking-[0.3em] text-sm font-bold">ФУТУРИСТІК КІТАПХАНА • ЖҰПТЫҚ ЖҰМЫС</p>
        </header>

        <div class="flex justify-center gap-4 mb-12">
            <template x-for="p in [1, 2, 3]">
                <button @click="currentPair = p; isExchanged = false" 
                    class="relative px-8 py-3 rounded-xl font-bold transition-all duration-300 overflow-hidden group"
                    :class="currentPair === p ? 'text-black' : 'text-cyan-500 border border-cyan-500/30'">
                    <div x-show="currentPair === p" class="absolute inset-0 bg-cyan-400 transition-all"></div>
                    <span class="relative z-10" x-text="'Жұп ' + p"></span>
                </button>
            </template>
        </div>

        <main class="max-w-5xl mx-auto">
            <div x-show="!isExchanged" x-transition class="glass-morphism p-6 md:p-10 rounded-[2rem] neon-glow">
                <div class="grid md:grid-cols-2 gap-10">
                    <template x-for="(word, index) in assignments[currentPair]">
                        <div class="space-y-6">
                            <div class="flex items-center gap-4">
                                <span class="bg-pink-600 text-white text-xs px-3 py-1 rounded-full font-bold" x-text="'Сөз #' + (index + 1)"></span>
                                <h2 class="text-3xl font-bold text-white tracking-tight" x-text="word"></h2>
                            </div>

                            <div class="space-y-4">
                                <div>
                                    <label class="text-xs text-gray-400 uppercase font-black mb-2 block tracking-widest">1. Синонимін тап:</label>
                                    <input type="text" x-model="answers[currentPair][index].synonym" placeholder="Мысалы: жылдам..."
                                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-cyan-300 focus:border-cyan-500 focus:bg-white/10 outline-none transition-all">
                                </div>

                                <div>
                                    <label class="text-xs text-gray-400 uppercase font-black mb-2 block tracking-widest">2. Мағыналық түрі:</label>
                                    <select x-model="answers[currentPair][index].type" 
                                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-gray-300 focus:border-pink-500 outline-none">
                                        <option value="">-- Түрді анықтаңыз --</option>
                                        <option value="Мезгіл">Мезгіл үстеуі</option>
                                        <option value="Мекен">Мекен үстеуі</option>
                                        <option value="Мөлшер">Мөлшер үстеуі</option>
                                        <option value="Сын-қимыл">Сын-қимыл үстеуі</option>
                                        <option value="Мақсат">Мақсат үстеуі</option>
                                        <option value="Себеп-салдар">Себеп-салдар үстеуі</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-xs text-pink-500 uppercase font-black mb-2 block tracking-widest">3. Сөйлем (тек СИНОНИМДІ қолдан):</label>
                                    <textarea x-model="answers[currentPair][index].sentence" 
                                        :placeholder="answers[currentPair][index].synonym ? '«' + answers[currentPair][index].synonym + '» сөзін қатыстырып сөйлем жаз...' : 'Алдымен синонимді жазыңыз...'"
                                        class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 h-28 text-white focus:border-pink-500 transition-all"></textarea>
                                    <p class="text-[10px] text-gray-500 mt-2 italic">Тақырып: Кітапхана, оқу, еңбек.</p>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="mt-12 flex justify-center">
                    <button @click="isExchanged = true" class="bg-gradient-to-r from-cyan-600 to-blue-700 px-16 py-4 rounded-2xl font-black uppercase tracking-widest hover:scale-105 transition-all shadow-[0_10px_30px_rgba(0,243,255,0.3)]">
                        Жұмысты тексеруге жіберу 🚀
                    </button>
                </div>
            </div>

            <div x-show="isExchanged" x-transition class="glass-morphism p-10 rounded-[2rem] border-pink-500/40">
                <h2 class="text-3xl font-black text-center mb-10 accent-text uppercase">Өзара Бағалау Кезеңі</h2>
                
                <div class="grid gap-8">
                    <template x-for="(ans, i) in answers[getNextPair()]">
                        <div class="bg-white/5 p-8 rounded-3xl border border-white/5 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">
                                <span class="text-4xl">📚</span>
                            </div>
                            
                            <div class="mb-6">
                                <span class="text-gray-500 text-xs font-bold block mb-1">БЕРІЛГЕН ҮСТЕУ:</span>
                                <span class="text-2xl font-black text-cyan-400" x-text="assignments[getNextPair()][i]"></span>
                            </div>

                            <div class="grid md:grid-cols-2 gap-8">
                                <div class="space-y-3">
                                    <p class="text-sm"><b>Табылған синонимі:</b> <span class="text-pink-400 font-bold" x-text="ans.synonym || '—'"></span></p>
                                    <p class="text-sm"><b>Үстеу түрі:</b> <span class="bg-cyan-500/20 text-cyan-300 px-2 py-1 rounded text-xs" x-text="ans.type || '—'"></span></p>
                                </div>
                                <div class="bg-black/50 p-5 rounded-2xl border border-white/5">
                                    <p class="text-xs text-gray-500 mb-2 uppercase font-bold">Синоним қолданылған сөйлем:</p>
                                    <p class="text-white italic leading-relaxed" x-text="ans.sentence || '...'"></p>
                                </div>
                            </div>

                            <div class="mt-6 pt-6 border-t border-white/5 flex flex-wrap gap-6">
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" class="w-5 h-5 accent-pink-500 bg-transparent border-white/20">
                                    <span class="text-xs text-gray-400 group-hover:text-white transition-colors">Синоним дұрыс табылған</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" class="w-5 h-5 accent-cyan-500">
                                    <span class="text-xs text-gray-400 group-hover:text-white">Сөйлемде синоним қолданылған</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer group">
                                    <input type="checkbox" class="w-5 h-5 accent-purple-500">
                                    <span class="text-xs text-gray-400 group-hover:text-white">Мағыналық түрі дұрыс</span>
                                </label>
                            </div>
                        </div>
                    </template>
                </div>

                <button @click="finishQuest()" class="w-full mt-10 py-5 bg-pink-600 text-white font-black rounded-2xl hover:bg-white hover:text-black transition-all uppercase tracking-widest shadow-xl">
                    Миссия аяқталды ✅
                </button>
            </div>
        </main>
    </div>

    <script>
        function adverbQuest() {
            return {
                currentPair: 1,
                isExchanged: false,
                assignments: {
                    1: ['Әдейі', 'Бүгін'],
                    2: ['Мұнда', 'Амалсыздан'],
                    3: ['Көп', 'Жедел']
                },
                answers: {
                    1: [{synonym: '', type: '', sentence: ''}, {synonym: '', type: '', sentence: ''}],
                    2: [{synonym: '', type: '', sentence: ''}, {synonym: '', type: '', sentence: ''}],
                    3: [{synonym: '', type: '', sentence: ''}, {synonym: '', type: '', sentence: ''}]
                },
                getNextPair() {
                    return this.currentPair === 3 ? 1 : this.currentPair + 1;
                },
                finishQuest() {
                    confetti({
                        particleCount: 200,
                        spread: 90,
                        origin: { y: 0.7 },
                        colors: ['#00f3ff', '#ff00ff', '#ffffff']
                    });
                    setTimeout(() => alert("Құттықтаймыз! Сіз синонимдер мен үстеу түрлерін толық меңгердіңіз!"), 400);
                }
            }
        }
    </script>
</body>
</html>
